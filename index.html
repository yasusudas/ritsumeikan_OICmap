<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="icon" href="/icon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon/favicon.png" />
    <link rel="apple-touch-icon" href="/icon/favicon.png" />
    <title>立命館OICキャンパスマップ</title>
    <script>
      const isFileMode = window.location.protocol === 'file:';
      window.__FILE_MODE__ = isFileMode;

      if (isFileMode) {
        document.addEventListener('DOMContentLoaded', () => {
          document.body.innerHTML = `
            <main style="min-height:100vh;display:grid;place-items:center;margin:0;padding:24px;background:linear-gradient(180deg,#fff1f1 0%,#eedddd 100%);font-family:'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;color:#102431;">
              <section style="max-width:720px;padding:28px;border-radius:24px;background:rgba(255,255,255,0.9);box-shadow:0 24px 50px rgba(16,36,49,0.12);">
                <h1 style="margin:0 0 16px;font-size:2rem;">立命館OICキャンパスマップ</h1>
                <p style="margin:0 0 12px;line-height:1.8;">このアプリは <strong>index.html を直接開く方式では動作しません</strong>。地図表示と操作機能はローカルサーバー経由で起動する必要があります。</p>
                <p style="margin:0 0 12px;line-height:1.8;">一番簡単なのは、プロジェクト直下の <code>start-map.command</code> をダブルクリックする方法です。</p>
                <p style="margin:0;line-height:1.8;">ターミナルを使う場合は <code>npm run dev</code> のあと、<code>http://127.0.0.1:5173/</code> を開いてください。</p>
              </section>
            </main>
          `;
        });
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body data-app-mode="viewer">
    <div class="app-shell">
      <header class="topbar">
        <h1 class="app-title">立命館OICキャンパスマップ</h1>
        <div id="search-panel" class="search-panel">
          <label class="search-label" for="search-input">教室検索</label>
          <div class="search-box">
            <input
              id="search-input"
              class="search-input"
              type="search"
              placeholder="教室名を検索 例: AC130 / C273 / AC"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
              enterkeyhint="search"
            />
            <button id="search-clear" class="search-clear" type="button" aria-label="検索をクリア" hidden>
              ×
            </button>
          </div>
          <div id="search-feedback" class="search-feedback" aria-live="polite">
            500以上の教室の位置を検索できます
          </div>
          <div id="search-results" class="search-results" role="listbox" hidden></div>
        </div>
        <div class="floor-tab-stack">
          <nav class="floor-tabs floor-tabs-primary" aria-label="フロア切替">
            <button class="floor-tab" data-floor="1F" type="button">1F</button>
            <button class="floor-tab" data-floor="2F" type="button">2F</button>
            <button class="floor-tab" data-floor="3F" type="button">3F</button>
            <button class="floor-tab" data-floor="4F" type="button">4F</button>
            <button class="floor-tab" data-floor="5F" type="button">5F</button>
          </nav>
          <nav class="floor-tabs floor-tabs-secondary" aria-label="棟別フロア切替">
            <button class="floor-tab floor-tab-wide" data-floor="A-6-9F" type="button">A棟6,7,8,9F</button>
            <button class="floor-tab floor-tab-wide" data-floor="H-6-9F" type="button">H棟6,7,8,9F</button>
          </nav>
        </div>
      </header>

      <main class="map-stage">
        <section class="map-card">
          <div id="viewer" class="viewer" aria-label="フロアマップ">
            <div id="canvas-layer" class="canvas-layer"></div>
            <div id="status" class="status-pill" aria-live="polite">読み込み中...</div>
          </div>

          <div class="zoom-controls" aria-label="ズーム操作">
            <button id="zoom-in" class="zoom-button" type="button" aria-label="拡大">+</button>
            <button id="zoom-out" class="zoom-button" type="button" aria-label="縮小">-</button>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>出典：立命館大学「立命館大学 大阪いばらきキャンパス フロアガイド 日本語」（2025年3月発行、OIC地域連携課）</p>
        <p>
          <a href="https://www.ritsumei.ac.jp/file.jsp?id=229844&f=.pdf" target="_blank" rel="noopener noreferrer">
            https://www.ritsumei.ac.jp/file.jsp?id=229844&f=.pdf
          </a>
        </p>
        <p>© 2026 Issei Yasuda (立命館大学非公式)</p>
      </footer>
    </div>
  </body>
</html>
